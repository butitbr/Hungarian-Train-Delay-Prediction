name: Automated Train Data Collection

on:
  # Run 3 times daily to capture realtime delay data before it disappears
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC (09:00 CET / 10:00 CEST)
    - cron: '0 14 * * *'  # 14:00 UTC (15:00 CET / 16:00 CEST)
    - cron: '0 21 * * *'  # 21:00 UTC (22:00 CET / 23:00 CEST)
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  
  # Trigger on push to main (for testing)
  push:
    branches:
      - main
    paths:
      - 'collect_train_data.py'
      - 'config.py'
      - '.github/workflows/scrape.yml'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent hanging jobs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create necessary directories
        run: |
          mkdir -p data/collected
          mkdir -p data/gtfs/latest/gtfs
          mkdir -p logs
      
      - name: Set up environment variables
        run: |
          echo "openweathermap_api_key=${{ secrets.OPENWEATHERMAP_API_KEY }}" >> .env
          echo "gtfs_user=${{ secrets.GTFS_USER }}" >> .env
          echo "gtfs_pw=${{ secrets.GTFS_PW }}" >> .env
      
      - name: Download GTFS data (if needed)
        run: |
          if [ ! -f "data/gtfs/latest/gtfs/stops.txt" ]; then
            echo "GTFS stops file not found, downloading..."
            python -c "from utils import download_gtfs_zip; download_gtfs_zip()" || echo "GTFS download failed, continuing without it"
          else
            echo "GTFS data already present"
          fi
        continue-on-error: true
      
      - name: Run data collection
        id: collect
        run: |
          echo "Starting collection at $(date)"
          python collect_train_data.py --verbose
          echo "collection_status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Check collection status
        run: |
          if [ "${{ steps.collect.outcome }}" = "success" ]; then
            echo "✓ Data collection completed successfully"
          else
            echo "⚠ Data collection encountered errors"
          fi
      
      - name: Upload collected data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: collected-data-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            data/collected/**/*.csv
          retention-days: 90
          if-no-files-found: warn
      
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: collection-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: logs/*.log
          retention-days: 30
          if-no-files-found: warn
      
      - name: Create job summary
        if: always()
        run: |
          echo "## Data Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.collect.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count collected files
          csv_count=$(find data/collected -name "*.csv" 2>/dev/null | wc -l)
          echo "**Files Collected:** $csv_count CSV files" >> $GITHUB_STEP_SUMMARY
          
          # Calculate total size
          if [ $csv_count -gt 0 ]; then
            total_size=$(du -sh data/collected 2>/dev/null | cut -f1)
            echo "**Total Size:** $total_size" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Show latest log excerpt
          if [ -f "logs/collect_"*".log" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Latest Log Excerpt" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 20 logs/collect_*.log | head -n 20 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Commit and push results (optional)
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/collected/ logs/ || true
          git commit -m "Auto-update: Collected train data from $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push || echo "Nothing to push"
        continue-on-error: true
          
          if [ -f "logs/scrape_"*".log" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Latest Log Excerpt:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 logs/scrape_*.log | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scraping job failed. Check logs for details."
          if [ -f "logs/scrape_"*".log" ]; then
            echo "::group::Last 50 lines of log"
            tail -50 logs/scrape_*.log
            echo "::endgroup::"
          fi
