name: Collect Current Weather

on:
  schedule:
    # Run 7 times per day (every 3 hours): 6:00, 9:00, 12:00, 15:00, 18:00, 21:00, 0:00 UTC
    - cron: '0 6,9,12,15,18,21,0 * * *'
  workflow_dispatch:  # Allow manual triggers

jobs:
  collect-weather:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Collect current weather
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
        run: |
          python collect_weather_current.py --verbose
      
      - name: Commit and push weather data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/weather/
          git add logs/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weather data: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
